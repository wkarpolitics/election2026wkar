<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1440" role="img" aria-labelledby="wkar-yt-banner-title">
  <title id="wkar-yt-banner-title">WKAR News YouTube Channel Art</title>
  <defs>
    <linearGradient id="yt-tricolor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#274c98"/>
      <stop offset="50%" stop-color="#1a3a2a"/>
      <stop offset="100%" stop-color="#c52e26"/>
    </linearGradient>
    <linearGradient id="yt-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf7f3"/>
      <stop offset="45%" stop-color="#f3ede4"/>
      <stop offset="100%" stop-color="#e8eef8"/>
    </linearGradient>
    <radialGradient id="yt-glow-blue" cx="85%" cy="15%" r="45%">
      <stop offset="0%" stop-color="#274c98" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#274c98" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="yt-glow-red" cx="8%" cy="88%" r="40%">
      <stop offset="0%" stop-color="#c52e26" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c52e26" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="yt-card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a2a"/>
      <stop offset="55%" stop-color="#25453d"/>
      <stop offset="100%" stop-color="#1e3348"/>
    </linearGradient>
  </defs>

  <!-- Full banner background -->
  <rect width="2560" height="1440" fill="url(#yt-bg)"/>
  <rect width="2560" height="1440" fill="url(#yt-glow-blue)"/>
  <rect width="2560" height="1440" fill="url(#yt-glow-red)"/>
  <rect y="0" width="2560" height="8" fill="url(#yt-tricolor)"/>

  <!-- Safe zone guide (hidden in export - opacity 0) -->
  <!-- TV/mobile safe: 1546 x 423 centered at y=507 -->

  <!-- Logo card — centered in YouTube safe area -->
  <g transform="translate(507, 640)">
    <rect width="1546" height="200" rx="28" fill="url(#yt-card-bg)"
          filter="drop-shadow(0px 18px 48px rgba(26,58,42,0.22))"/>
    <rect width="1546" height="6" rx="3" fill="url(#yt-tricolor)"/>
    <rect y="194" width="1546" height="6" rx="3" fill="url(#yt-tricolor)"/>
    <rect x="0" y="28" width="10" height="144" rx="5" fill="url(#yt-tricolor)"/>

    <text x="80" y="128"
          font-family="Inter, system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
          font-weight="800" font-size="96" fill="#ffffff"
          letter-spacing="-2">WKAR</text>

    <rect x="430" y="52" width="3" height="96" rx="1.5" fill="rgba(255,255,255,0.22)"/>

    <text x="462" y="128"
          font-family="Inter, system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
          font-weight="600" font-size="82" fill="#faf7f3"
          letter-spacing="14">NEWS</text>

    <text x="80" y="172"
          font-family="Inter, system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
          font-weight="500" font-size="22" fill="rgba(250,247,243,0.72)"
          letter-spacing="5">MID-MICHIGAN PUBLIC MEDIA</text>

    <circle cx="1460" cy="100" r="8" fill="#4ade80"/>
    <circle cx="1460" cy="100" r="16" fill="#4ade80" opacity="0.18"/>
  </g>
</svg>